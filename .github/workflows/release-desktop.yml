name: Release Desktop

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build macOS desktop archive
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Build app bundle
        run: CSC_IDENTITY_AUTO_DISCOVERY=false npm --prefix desktop exec electron-builder -- --mac dir

      - name: Resolve release metadata
        id: meta
        run: |
          TAG_NAME="${GITHUB_REF_NAME:-desktop-manual}"
          APP_VERSION=$(node -p "require('./desktop/package.json').version")
          APP_DIR=$(ls -td desktop/dist/mac* | head -1)
          if [ -z "$APP_DIR" ] || [ ! -d "$APP_DIR/openmud.app" ]; then
            echo "No app bundle was produced."
            exit 1
          fi
          ZIP_PATH="desktop/dist/openmud-${APP_VERSION}-arm64.zip"
          rm -f "$ZIP_PATH"
          (
            cd "$APP_DIR"
            zip -qry "../openmud-${APP_VERSION}-arm64.zip" "openmud.app"
          )
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmud-desktop-zip
          path: ${{ steps.meta.outputs.zip_path }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: openmud Desktop ${{ steps.meta.outputs.app_version }}
          generate_release_notes: true
          files: ${{ steps.meta.outputs.zip_path }}
